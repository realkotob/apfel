name: Publish Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump to publish
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-26
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TYPE: ${{ inputs.release_type }}
      TAP_REPOSITORY: Arthur-Ficial/homebrew-tap
      TAP_BRANCH: main
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Select latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [[ -n "$latest" ]]; then
            echo "Selecting $latest"
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          echo "Active SDK: $(xcrun --show-sdk-version)"
          echo "Swift: $(swift --version 2>&1 | head -1)"

      - name: Verify tap token is configured
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
        run: |
          if [[ -z "$TAP_TOKEN" ]]; then
            echo "Missing HOMEBREW_TAP_PUSH_TOKEN repository secret."
            echo "Create a fine-grained GitHub token with Contents: Read and write on $TAP_REPOSITORY."
            exit 1
          fi

      - name: Bump version and build release
        run: |
          case "$RELEASE_TYPE" in
            patch) make release-patch ;;
            minor) make release-minor ;;
            major) make release-major ;;
            *)
              echo "Unsupported release type: $RELEASE_TYPE"
              exit 1
              ;;
          esac

      - name: Run unit tests
        run: swift run apfel-tests

      - name: Install Python test dependencies
        run: pip3 install --break-system-packages pytest httpx openai openapi-core pyyaml

      - name: Run integration tests
        run: |
          # Note: GitHub-hosted macos-26 runners do not have Apple Intelligence.
          # Tests that need the model skip gracefully. The full 7-suite
          # qualification runs locally via `make preflight`.

          # Start servers
          .build/release/apfel --serve --port 11434 2>/dev/null &
          .build/release/apfel --serve --port 11435 --mcp mcp/calculator/server.py 2>/dev/null &

          # Wait for readiness (15s timeout)
          for i in $(seq 1 15); do
            if curl -sf http://localhost:11434/health >/dev/null 2>&1 && \
               curl -sf http://localhost:11435/health >/dev/null 2>&1; then
              echo "Servers ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Run structural integration tests (no Apple Intelligence needed)
          python3 -m pytest \
            Tests/integration/cli_e2e_test.py \
            Tests/integration/performance_test.py \
            Tests/integration/security_test.py \
            Tests/integration/openapi_spec_test.py \
            -v --tb=short

          # Cleanup
          pkill -f "apfel --serve" 2>/dev/null || true

      - name: Capture release version
        id: version
        run: echo "value=$(cat .version)" >> "$GITHUB_OUTPUT"

      - name: Commit release files
        run: |
          version="${{ steps.version.outputs.value }}"
          git add .version README.md Sources/BuildInfo.swift
          git commit -m "release v$version"
          git tag -a "v$version" -m "v$version"
          git push origin HEAD:main
          git push origin "v$version"

      - name: Package release artifact
        id: asset
        run: |
          make package-release-asset >/tmp/apfel-release-asset.txt
          echo "name=$(tail -1 /tmp/apfel-release-asset.txt)" >> "$GITHUB_OUTPUT"
          echo "sha256=$(make print-release-sha256)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        run: |
          version="${{ steps.version.outputs.value }}"
          asset="${{ steps.asset.outputs.name }}"

          # Generate release notes from commits since last tag
          prev_tag=$(git tag --sort=-v:refname | grep -v "v$version" | head -1)
          notes="## What's Changed"$'\n\n'
          if [[ -n "$prev_tag" ]]; then
            notes+=$(git log --oneline "$prev_tag"..HEAD~1 -- | sed 's/^/- /')
          fi
          notes+=$'\n\n'"---"$'\n'
          notes+="Install: \`brew install apfel\`"$'\n'
          notes+="Upgrade: \`brew upgrade apfel\`"

          if gh release view "v$version" >/dev/null 2>&1; then
            gh release upload "v$version" "$asset" --clobber
          else
            gh release create "v$version" "$asset" \
              --title "v$version" \
              --notes "$notes"
          fi

      # --- Homebrew tap update ---
      # This section will be removed after homebrew-core accepts apfel (PR #276365).
      # Until then, the tap is the primary distribution channel.

      - name: Check out homebrew tap
        uses: actions/checkout@v6
        with:
          repository: Arthur-Ficial/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          ref: main
          path: homebrew-tap

      - name: Update Homebrew formula
        run: |
          make update-homebrew-formula \
            HOMEBREW_FORMULA_OUTPUT="homebrew-tap/Formula/apfel.rb" \
            HOMEBREW_FORMULA_SHA256="${{ steps.asset.outputs.sha256 }}"

      - name: Push Homebrew tap update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/apfel.rb; then
            echo "Homebrew formula already up to date."
            exit 0
          fi
          version="${{ steps.version.outputs.value }}"
          git add Formula/apfel.rb
          git commit -m "apfel v$version"
          git push origin HEAD:$TAP_BRANCH
